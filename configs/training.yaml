# EGT-MARL 训练配置

# 训练参数
training:
  num_episodes: 1000
  max_steps_per_episode: 200
  batch_size: 32
  buffer_size: 5000
  gamma: 0.99
  tau: 0.01
  learning_rate: 0.001
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995
  target_update_interval: 100
  checkpoint_interval: 100
  eval_interval: 50
  num_eval_episodes: 10
  save_best_model: true

# 环境参数
environment:
  map_size: [100, 100]
  num_agents: 5
  num_victims: 20
  num_resources: 10
  num_hospitals: 3
  disaster_type: earthquake
  severity: medium

# 算法参数
algorithm:
  hidden_dim: 128
  mixing_hidden_dim: 64
  attention_heads: 4
  egt_lambda: 0.5
  pareto_weight_alpha: 0.3  # 效率权重
  pareto_weight_beta: 0.4   # 公平性权重
  pareto_weight_gamma: 0.3  # 鲁棒性权重
  anti_spoofing_enabled: true

# 输出设置
output:
  directory: experiment_results
  save_visualizations: true
  save_checkpoints: true
  save_logs: true