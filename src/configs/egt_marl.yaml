# EGT-MARL Algorithm Configuration
# Configuration for Evolutionary Game Theory - Multi-Agent Reinforcement Learning

# MARL Layer Configuration
marl:
  # Network architecture
  state_dim: 256
  action_dim: 64
  num_agents: 17  # 10 drones + 5 ambulances + 2 hospitals
  hidden_dim: 128
  mixing_hidden_dim: 64
  
  # QMIX improvements
  improved_reward_structure: true
  hierarchical_action_space: true
  attention_mechanism: true
  attention_heads: 4
  
  # Training parameters
  learning_rate: 0.0001
  gamma: 0.99  # Discount factor
  tau: 0.005  # Target network update rate
  batch_size: 32
  buffer_size: 10000
  update_frequency: 4  # Update every N steps
  
  # Exploration
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995
  boltzmann_temperature: 1.0

# EGT Layer Configuration
egt:
  num_strategies: 5
  # Strategy definitions:
  # 0: Efficiency-focused (maximize total survivors)
  # 1: Fairness-focused (minimize inequality)
  # 2: Balanced approach
  # 3: Risk-averse (prioritize certainty)
  # 4: Adaptive (learn from environment)
  
  learning_rate: 0.01
  mutation_rate: 0.05
  selection_pressure: 2.0
  population_size: 100
  
  # Dynamic fairness-efficiency trade-off
  tradeoff_adaptation_rate: 0.1
  min_fairness_weight: 0.2
  max_fairness_weight: 0.8
  
  # Evolutionary dynamics
  replicator_dynamics: true
  fitness_sharing: true
  niching_radius: 0.1

# Anti-spoofing Mechanism
anti_spoofing:
  enabled: true
  observation_dim: 128
  hidden_dim: 64
  
  # Bayesian truthfulness verification
  prior_belief: 0.5  # Initial belief in agent truthfulness
  evidence_strength: 0.7  # How strongly evidence updates belief
  detection_threshold: 0.8  # Threshold for marking as malicious
  
  # Reputation system
  reputation_decay: 0.99  # Reputation decay per time step
  min_reputation: 0.1
  max_reputation: 1.0
  reputation_weight: 0.3  # Weight in decision making
  
  # Penalties
  false_report_penalty: -0.5
  malicious_action_penalty: -1.0
  detection_reward: 0.2

# Dynamic Pareto Frontier
dynamic_frontier:
  num_objectives: 3
  # Objectives:
  # 0: Efficiency (total survivors)
  # 1: Fairness (Gini coefficient)
  # 2: Robustness (performance under attack)
  
  frontier_size: 50  # Number of points on Pareto frontier
  update_frequency: 100  # Update frontier every N steps
  
  # Adaptive weights
  weight_adaptation_rate: 0.05
  min_weight: 0.1
  max_weight: 0.8
  
  # Evolutionary algorithm for frontier
  mutation_strength: 0.1
  crossover_rate: 0.7
  elitism_rate: 0.1

# Network Architectures
networks:
  # Agent networks
  agent_network:
    type: "mlp"
    layers: [256, 128, 64]
    activation: "relu"
    dropout: 0.1
    batch_norm: true
    
  # Mixing network (QMIX)
  mixing_network:
    type: "hypernet"
    hyper_hidden: [64, 32]
    main_hidden: [32, 16]
    activation: "elu"
    
  # Communication network
  communication_network:
    enabled: true
    type: "attention"
    hidden_dim: 64
    num_heads: 4
    num_layers: 2
    
  # EGT strategy network
  strategy_network:
    type: "mlp"
    layers: [128, 64, 32]
    activation: "tanh"

# Training Configuration
training:
  total_episodes: 10000
  max_steps_per_episode: 1000
  evaluation_frequency: 100  # Evaluate every N episodes
  save_frequency: 500  # Save model every N episodes
  
  # Curriculum learning
  curriculum_enabled: true
  difficulty_increase_rate: 0.01
  max_difficulty: 1.0
  
  # Reward shaping
  reward_shaping: true
  shaping_weights:
    survivor_reward: 10.0
    response_time_penalty: -0.1
    resource_penalty: -0.01
    fairness_bonus: 2.0
    communication_penalty: -0.001
    
  # Early stopping
  early_stopping: true
  patience: 100  # Episodes without improvement
  min_delta: 0.01

# Optimization
optimization:
  optimizer: "adam"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1e-8
  weight_decay: 0.0001
  gradient_clip: 10.0
  
  # Learning rate scheduling
  lr_scheduler: "cosine"
  warmup_steps: 1000
  min_lr: 1e-6

# Experiment Tracking
tracking:
  enabled: true
  wandb_project: "egt-marl-disaster"
  wandb_entity: "research-team"
  log_frequency: 10  # Log metrics every N steps
  
  # Metrics to track
  metrics:
    - "total_reward"
    - "total_survivors"
    - "mean_response_time"
    - "gini_coefficient"
    - "pareto_frontier"
    - "spoofing_detected"
    - "communication_overhead"
    - "training_loss"