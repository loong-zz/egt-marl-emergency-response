# Disaster Simulation Configuration
# Configuration for DisasterSim-2026 high-fidelity simulation environment

# Simulation parameters
simulation:
  time_step: 1.0  # Time per simulation step (seconds)
  max_steps: 1000  # Maximum simulation steps
  real_time_factor: 1.0  # Real-time vs simulation time
  
# Disaster scenarios
scenarios:
  earthquake_standard:
    name: "Standard Earthquake"
    intensity: 7.0  # Richter scale
    epicenter: [500, 500]  # Coordinates
    radius: 2000  # Affected radius (meters)
    building_collapse_rate: 0.3
    casualty_rate: 0.15
    resource_depletion_rate: 0.2
    
  flood_moderate:
    name: "Moderate Flood"
    water_level: 3.0  # Meters
    affected_area: 5000  # Square meters
    evacuation_required: true
    medical_needs_multiplier: 1.5
    
  hurricane_severe:
    name: "Severe Hurricane"
    wind_speed: 45.0  # m/s
    rainfall: 300.0  # mm
    evacuation_zones: 3
    infrastructure_damage: 0.4

# Agent configurations
agents:
  drone:
    count: 10
    initial_resources:
      medical_kits: 5.0
      water: 10.0
      food: 5.0
      fuel: 20.0
      battery: 100.0
    capabilities:
      max_speed: 30.0
      sensor_range: 100.0
      communication_range: 200.0
      payload_capacity: 10.0
      
  ambulance:
    count: 5
    initial_resources:
      medical_kits: 20.0
      water: 50.0
      food: 30.0
      fuel: 100.0
      patient_capacity: 4.0
    capabilities:
      max_speed: 15.0
      road_dependency: 0.8
      treatment_capability: 0.7
      
  hospital:
    count: 2
    initial_resources:
      medical_kits: 100.0
      water: 500.0
      food: 300.0
      fuel: 500.0
      patient_capacity: 40.0
      surgical_capacity: 8.0
    capabilities:
      max_speed: 5.0
      treatment_rate: 10.0
      surgical_rate: 2.0

# Resource constraints
resources:
  medical_kits:
    total_available: 500.0
    replenishment_rate: 5.0  # per hour
    
  water:
    total_available: 5000.0
    replenishment_rate: 50.0
    
  food:
    total_available: 3000.0
    replenishment_rate: 30.0
    
  fuel:
    total_available: 2000.0
    replenishment_rate: 20.0
    
  blood_supply:
    total_available: 100.0
    replenishment_rate: 1.0

# Communication parameters
communication:
  enabled: true
  range: 500.0  # Maximum communication range
  delay_mean: 0.5  # Mean communication delay (seconds)
  delay_std: 0.2  # Delay standard deviation
  packet_loss_rate: 0.05  # Probability of packet loss
  bandwidth: 1000.0  # Bandwidth in kbps

# Environmental constraints
environment:
  map_size: [1000, 1000]  # Width, height in meters
  obstacle_density: 0.1  # Density of obstacles (0-1)
  road_network: true
  weather_effects: true
  day_night_cycle: false
  
# Task generation
tasks:
  generation_rate: 0.1  # Tasks per second
  urgency_distribution:
    critical: 0.2
    urgent: 0.3
    normal: 0.4
    low: 0.1
  resource_requirements:
    min: 1.0
    max: 20.0
  duration_distribution:
    min: 60.0  # seconds
    max: 3600.0

# Evaluation metrics
metrics:
  tracking_enabled: true
  save_interval: 100  # Save metrics every N steps
  metrics_to_track:
    - total_survivors
    - response_time
    - resource_utilization
    - fairness_metrics
    - communication_overhead